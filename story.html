<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story 💎</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body class="story-page">

<div class="stars"></div>
<div class="moon"></div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>


<section class="story">

<div class="glass-card">

<h4>📖 Chapter One</h4>

<h1 id="storyTitle"></h1>

<div id="storyText" class="story-text"></div>


<div class="timeline">

<div class="step active">
<div class="circle">1</div>
<p>Dream</p>
</div>

<div class="line"></div>

<div class="step">
<div class="circle">2</div>
<p>Smile</p>
</div>

<div class="line"></div>

<div class="step">
<div class="circle">3</div>
<p>Success</p>
</div>

<div class="line"></div>

<div class="step">
<div class="circle">4</div>
<p>Happiness</p>
</div>

</div>


<div class="quote">
"Every great story begins with one beautiful person."
</div>


<div class="buttons">

<button onclick="backPage()">
← Back
</button>

<button onclick="nextPage()">
Letter 💌 →
</button>
</div>


</div>

</section>


<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>


<script>

const title="The Story of Crystal 💎";

let titleIndex=0;


function typeTitle(){

if(titleIndex<title.length){

document.getElementById("storyTitle").innerHTML += title.charAt(titleIndex);

titleIndex++;

setTimeout(typeTitle,80);

}

}

typeTitle();



const lines=[

"Once upon a time, a wonderful person named Crystal came into this world.",

"Her smile could brighten even the darkest days.",

"She inspired everyone around her with kindness and happiness.",

"Every challenge became another step toward success.",

"And today, the stars celebrate her special birthday.",

"May every dream come true and every moment become a beautiful memory."

];


let line=0;


function writeStory(){

if(line<lines.length){

let p=document.createElement("p");

p.innerHTML=lines[line];

document.getElementById("storyText").appendChild(p);


setTimeout(()=>{

p.style.opacity="1";

},100);


line++;

setTimeout(writeStory,1800);

}

}


setTimeout(writeStory,1200);



function nextPage(){

document.body.classList.add("fadeOut");

setTimeout(()=>{

window.location.href="letter.html";

},1200);

}


function backPage(){

document.body.classList.add("fadeOut");

setTimeout(()=>{

window.location.href="welcome.html";

},1200);

}


</script>


</body>
</html>
