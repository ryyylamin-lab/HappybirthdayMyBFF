<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Crystal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Animated Background -->

<div class="background">

<div class="stars"></div>

<div class="moon"></div>

<div class="cloud cloud1"></div>

<div class="cloud cloud2"></div>

<div class="cloud cloud3"></div>

<div class="cloud cloud4"></div>

</div>

<!-- Floating Hearts -->

<div class="hearts">
<span>💙</span>
<span>✨</span>
<span>⭐</span>
<span>💎</span>
<span>☁️</span>
<span>💙</span>
<span>✨</span>
<span>⭐</span>
</div>

<!-- Main Card -->

<section class="hero">

<div class="glass">

<p class="small">
A Special Surprise
</p>

<h1 id="typing">
Happy Birthday
</h1>

<h2>
Crystal 💎
</h2>

<p class="text">

Some people are like stars.<br>
They brighten every place they go.<br><br>

Today is all about YOU.<br>

Let's begin a magical birthday journey.

</p>

<button onclick="startJourney()">

Start The Journey →

</button>

</div>

</section>

<!-- Music -->

<audio id="music" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>

<!-- Footer -->

<footer>

Made with ❤️ For Crystal

</footer>

<script src="script.js"></script>

<script>

function startJourney(){

document.getElementById("music").play();

document.body.classList.add("fadeOut");

setTimeout(function(){

window.location="welcome.html";

},1800);

}

</script>

</body>
</html>
